name: 24/7 Ultimate 4K Downloader (No Cookies)

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Message
        id: fetch_msg
        run: |
          RESPONSE=$(curl -s "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/getUpdates")
          LAST_MSG=$(echo "$RESPONSE" | jq -r '.result[-1].message.text')
          MSG_DATE=$(echo "$RESPONSE" | jq -r '.result[-1].message.date')
          CURRENT_DATE=$(date +%s)
          
          # Check: Message 5 min purana na ho
          if [[ $((CURRENT_DATE - MSG_DATE)) -le 330 ]] && [[ "$LAST_MSG" == *"yout"* ]]; then
            echo "URL=$LAST_MSG" >> $GITHUB_ENV
            echo "PROCESS=true" >> $GITHUB_ENV
          else
            echo "PROCESS=false" >> $GITHUB_ENV
          fi

      - name: Setup Environment
        if: env.PROCESS == 'true'
        run: |
          sudo apt-get update && sudo apt-get install ffmpeg jq -y
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download High Quality (iOS Client Bypass)
        if: env.PROCESS == 'true'
        run: |
          # iOS client aur TV client restrictions ko bypass karne mein help karte hain
          /usr/local/bin/yt-dlp -f "bestvideo+bestaudio/best" \
          --merge-output-format mp4 \
          --extractor-args "youtube:player_client=ios,tv" \
          --geo-bypass \
          --add-header "Accept-Language: en-US,en;q=0.9" \
          "${{ env.URL }}" -o "video.mp4"

      - name: Smart Delivery (Direct or Link)
        if: env.PROCESS == 'true'
        run: |
          FILE_SIZE=$(stat -c%s "video.mp4")
          MAX_SIZE=48000000 # 48MB limit for Telegram Bot
          
          if [ "$FILE_SIZE" -lt "$MAX_SIZE" ]; then
            echo "Sending direct video..."
            curl -v -F "video=@video.mp4" "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendVideo?chat_id=${{ secrets.CHAT_ID }}&caption=✅ Done! 4K Clip Ready."
          else
            echo "File too big for Telegram, uploading to GoFile..."
            SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
            UPLOAD_RES=$(curl -F "file=@video.mp4" "https://$SERVER.gofile.io/contents/uploadfile")
            DL_LINK=$(echo "$UPLOAD_RES" | jq -r '.data.downloadPage')
            
            MSG="✅ *4K Video Uploaded!*%0A%0A📽️ *Video:* ${{ env.URL }}%0A🔗 *Download Link:* $DL_LINK"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
                 -d "chat_id=${{ secrets.CHAT_ID }}&text=$MSG&parse_mode=Markdown"
          fi
