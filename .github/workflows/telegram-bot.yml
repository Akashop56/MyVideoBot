name: 24/7 Pro 4K Downloader

on:
  schedule:
    - cron: '*/5 * * * *' # Har 5 minute mein link check karega
  workflow_dispatch: # Manual test ke liye button

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Filter Telegram Message
        id: fetch_msg
        run: |
          # Latest message fetch karna
          RESPONSE=$(curl -s "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/getUpdates")
          
          # Message data extract karna
          LAST_MSG=$(echo "$RESPONSE" | jq -r '.result[-1].message.text')
          MSG_DATE=$(echo "$RESPONSE" | jq -r '.result[-1].message.date')
          CURRENT_DATE=$(date +%s)
          
          # Check: Kya message pichle 5.5 minutes (330s) ke andar aaya hai?
          TIME_DIFF=$((CURRENT_DATE - MSG_DATE))
          
          if [[ "$TIME_DIFF" -le 330 ]] && [[ "$LAST_MSG" == *"yout"* ]]; then
            echo "URL=$LAST_MSG" >> $GITHUB_ENV
            echo "PROCESS=true" >> $GITHUB_ENV
            echo "🚀 Naya link mila: $LAST_MSG"
          else
            echo "PROCESS=false" >> $GITHUB_ENV
            echo "😴 Koi naya link nahi mila."
          fi

      - name: Setup Pro Environment
        if: env.PROCESS == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg jq nodejs -y
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Smart Download (Mirror & Regional Bypass)
        if: env.PROCESS == 'true'
        run: |
          VIDEO_ID=$(echo "${{ env.URL }}" | sed -n 's/.*v=\([^&?]*\).*/\1/p; s/.*be\/\([^&?]*\).*/\1/p')
          MIRRORS=("https://yewtu.be" "https://invidious.projectsegfau.lt" "https://inv.tux.rs" "https://invidious.nerdvpn.de")
          
          SUCCESS=false
          # Sabse pehle Mirrors try karein (Regional bypass ke liye)
          for MIRROR in "${MIRRORS[@]}"; do
            echo "Trying Mirror: $MIRROR"
            if /usr/local/bin/yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 \
               --socket-timeout 30 "$MIRROR/watch?v=$VIDEO_ID" -o "pro_video.mp4"; then
              SUCCESS=true && break
            fi
          done

          # Agar mirrors fail ho toh Direct Android API try karein
          if [ "$SUCCESS" = "false" ]; then
            echo "Mirrors failed. Using Android API Bypass..."
            /usr/local/bin/yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 \
            --extractor-args "youtube:player_client=android" "${{ env.URL }}" -o "pro_video.mp4"
          fi

      - name: Upload to GoFile (Pro Storage)
        if: env.PROCESS == 'true'
        id: upload
        run: |
          # Best server dhoond kar upload karna
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
          UPLOAD_RES=$(curl -F "file=@pro_video.mp4" "https://$SERVER.gofile.io/contents/uploadfile")
          DL_LINK=$(echo "$UPLOAD_RES" | jq -r '.data.downloadPage')
          echo "FINAL_LINK=$DL_LINK" >> $GITHUB_ENV

      - name: Final Telegram Notification
        if: env.PROCESS == 'true'
        run: |
          MSG="✅ *Download Complete!*%0A%0A📽️ *Video:* ${{ env.URL }}%0A🔗 *Direct Link:* ${{ env.FINAL_LINK }}%0A%0A_Ready for 4K Editing!_"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
               -d "chat_id=${{ secrets.CHAT_ID }}&text=$MSG&parse_mode=Markdown"
