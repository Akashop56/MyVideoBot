name: 24/7 Ultimate 4K Downloader (Final Fix)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Message
        id: fetch_msg
        run: |
          # Message fetch logic with better error handling
          RESPONSE=$(curl -s "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/getUpdates")
          LAST_MSG=$(echo "$RESPONSE" | jq -r '.result[-1].message.text // empty')
          MSG_DATE=$(echo "$RESPONSE" | jq -r '.result[-1].message.date // 0')
          CURRENT_DATE=$(date +%s)
          
          # Check if link is fresh (last 10 mins)
          if [[ ! -z "$LAST_MSG" ]] && [[ "$LAST_MSG" == *"yout"* ]]; then
             echo "URL=$LAST_MSG" >> $GITHUB_ENV
             echo "PROCESS=true" >> $GITHUB_ENV
             echo "Found URL: $LAST_MSG"
          else
             echo "PROCESS=false" >> $GITHUB_ENV
             echo "No new link found."
          fi

      - name: Setup Tools
        if: env.PROCESS == 'true'
        run: sudo apt-get update && sudo apt-get install jq curl -y

      - name: Bypass and Download (High Quality)
        if: env.PROCESS == 'true'
        run: |
          # Cobalt API use karenge bypass ke liye (Very Reliable)
          API_RES=$(curl -s -X POST https://api.cobalt.tools/api/json \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"url\": \"${{ env.URL }}\", \"videoQuality\": \"1080\", \"downloadMode\": \"video\"}")

          DL_URL=$(echo "$API_RES" | jq -r '.url // .picker[0].url')

          if [ "$DL_URL" != "null" ] && [ ! -z "$DL_URL" ]; then
            echo "Downloading from: $DL_URL"
            curl -L "$DL_URL" -o "video.mp4"
          else
            echo "API failed. Video region-locked ho sakti hai."
            exit 1
          fi

      - name: Telegram Upload
        if: env.PROCESS == 'true'
        run: |
          # Check if file exists and is not empty
          if [ -f "video.mp4" ] && [ $(stat -c%s "video.mp4") -gt 1000 ]; then
             # Direct send if under 50MB, else GoFile
             FILE_SIZE=$(stat -c%s "video.mp4")
             if [ "$FILE_SIZE" -lt 45000000 ]; then
                curl -F "video=@video.mp4" "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendVideo?chat_id=${{ secrets.CHAT_ID }}&caption=✅ 4K/1080p Video Ready!"
             else
                # GoFile Upload
                SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
                UPLOAD_RES=$(curl -F "file=@video.mp4" "https://$SERVER.gofile.io/contents/uploadfile")
                DL_LINK=$(echo "$UPLOAD_RES" | jq -r '.data.downloadPage')
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
                     -d "chat_id=${{ secrets.CHAT_ID }}&text=✅ *Large Video Ready:* $DL_LINK&parse_mode=Markdown"
             fi
          else
             echo "Download failed."
             exit 1
          fi
