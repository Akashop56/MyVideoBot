name: 24/7 Ultimate 4K Downloader (API Bypass)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Message
        id: fetch_msg
        run: |
          # Latest message uthana
          RESPONSE=$(curl -s "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/getUpdates")
          LAST_MSG=$(echo "$RESPONSE" | jq -r '.result[-1].message.text')
          MSG_DATE=$(echo "$RESPONSE" | jq -r '.result[-1].message.date')
          CURRENT_DATE=$(date +%s)
          
          if [[ $((CURRENT_DATE - MSG_DATE)) -le 330 ]] && [[ "$LAST_MSG" == *"yout"* ]]; then
            echo "URL=$LAST_MSG" >> $GITHUB_ENV
            echo "PROCESS=true" >> $GITHUB_ENV
          else
            echo "PROCESS=false" >> $GITHUB_ENV
          fi

      - name: Setup Tools
        if: env.PROCESS == 'true'
        run: sudo apt-get update && sudo apt-get install jq curl -y

      - name: Bypass and Download (4K Quality)
        if: env.PROCESS == 'true'
        run: |
          # Cobalt API ka use karke 4K link nikalna
          # Yeh wahi technique hai jo badi websites use karti hain
          API_RES=$(curl -s -X POST https://api.cobalt.tools/api/json \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{
              \"url\": \"${{ env.URL }}\",
              \"videoQuality\": \"1080\",
              \"downloadMode\": \"video\",
              \"filenameStyle\": \"basic\"
            }")

          # Direct download URL nikalna
          DL_URL=$(echo "$API_RES" | jq -r '.url')

          if [ "$DL_URL" == "null" ] || [ -z "$DL_URL" ]; then
            echo "API failed, trying fallback method..."
            # Fallback for small clips
            DL_URL=$(echo "$API_RES" | jq -r '.picker[0].url')
          fi

          echo "Downloading from: $DL_URL"
          curl -L "$DL_URL" -o "video.mp4"

      - name: Send Direct to Telegram
        if: env.PROCESS == 'true'
        run: |
          FILE_SIZE=$(stat -c%s "video.mp4")
          # Agar file 200 bytes se kam hai toh iska matlab error download hua hai
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "Download failed or empty file."
            exit 1
          fi

          # Telegram 50MB limit check
          MAX_SIZE=48000000 
          
          if [ "$FILE_SIZE" -lt "$MAX_SIZE" ]; then
            echo "Sending direct video..."
            curl -v -F "video=@video.mp4" "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendVideo?chat_id=${{ secrets.CHAT_ID }}&caption=✅ Done! 4K Clip Ready for Editing."
          else
            echo "File too big for direct send, uploading to GoFile..."
            # GoFile upload logic as fallback
            UPLOAD_RES=$(curl -F "file=@video.mp4" "https://$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name').gofile.io/contents/uploadfile")
            DL_LINK=$(echo "$UPLOAD_RES" | jq -r '.data.downloadPage')
            
            MSG="✅ *4K Video (Large File):*%0A🔗 *Link:* $DL_LINK"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
                 -d "chat_id=${{ secrets.CHAT_ID }}&text=$MSG&parse_mode=Markdown"
          fi
