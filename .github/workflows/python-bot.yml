name: 24/7 Pro Video Downloader

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y

      - name: Install Deps
        run: pip install -r requirements.txt

      - name: Decode Cookies
        run: |
          # Base64 secret se cookies.txt banana
          echo "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt
          # Sirf format check ke liye
          head -n 1 cookies.txt

      - name: Run Bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: python bot.py
