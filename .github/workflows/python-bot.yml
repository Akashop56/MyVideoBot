name: 24/7 Python Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y

      - name: Install Deps
        run: pip install -r requirements.txt

      - name: Decode Cookies
        run: |
          # Yeh command aapke secret ko sahi cookies.txt mein badal degi
          echo "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt
          # Sirf check karne ke liye (security ke liye delete kar sakte hain)
          head -n 1 cookies.txt

      - name: Run
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: python bot.py
